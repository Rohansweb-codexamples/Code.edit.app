<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Code.edit</title>
    <!-- Tailwind CSS for modern premium graphics -->
    <script src="https://jsdelivr.net"></script>
    <!-- CodeMirror Editor Core via CDN -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <script src="https://cloudflare.com"></script>
    <!-- CodeMirror Languages -->
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>
    <!-- CodeMirror Themes -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <link rel="stylesheet" href="https://cloudflare.com">
    <link rel="stylesheet" href="https://cloudflare.com">
    
    <style>
        /* Smooth transitions for theme swapping */
        body, .editor-container, .navbar {
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        .CodeMirror {
            height: calc(100vh - 120px) !important;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 15px;
            border-radius: 12px;
            padding: 8px;
        }
        /* Glassmorphism effects for premium feel */
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glass-light {
            background: rgba(0, 0, 0, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 0, 0, 0.08);
        }
    </style>
</head>
<body class="bg-[#1e1e1e] text-gray-200 font-sans h-screen flex flex-col justify-between overflow-hidden">

    <!-- Top Premium Navbar -->
    <header id="navbar" class="glass px-4 py-3 flex items-center justify-between shadow-lg">
        <div class="flex items-center space-x-3">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-tr from-cyan-500 to-blue-600 flex items-center justify-center shadow-md shadow-blue-500/30">
                <span class="text-white font-black text-sm">&lt;/&gt;</span>
            </div>
            <h1 class="text-lg font-bold tracking-tight bg-gradient-to-r from-white to-gray-400 bg-clip-text text-transparent">Code.edit</h1>
        </div>
        
        <div class="flex items-center space-x-2">
            <!-- Language Picker -->
            <select id="langSelect" class="bg-zinc-800 text-xs text-gray-300 rounded-lg px-3 py-1.5 border border-zinc-700 focus:outline-none focus:border-blue-500">
                <option value="javascript">JavaScript</option>
                <option value="python">Python</option>
                <option value="clike">C / C++ / Java</option>
            </select>
            
            <!-- Settings Button -->
            <button onclick="toggleSettingsModal()" class="p-2 hover:bg-zinc-800 rounded-lg transition-colors">
                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            </button>
        </div>
    </header>

    <!-- Main Workspace Container -->
    <main class="flex-1 p-3 relative">
        <div id="editorWrapper" class="h-full rounded-xl overflow-hidden shadow-2xl border border-zinc-800/80">
            <textarea id="editorCode"># Welcome to Code.edit&#10;def greet():&#10;    print("Hello Mobile Developer!")&#10;&#10;greet()</textarea>
        </div>
        
        <!-- Floating Execution Action Floating Button -->
        <button onclick="runConsoleDemo()" class="absolute bottom-6 right-6 w-14 h-14 bg-gradient-to-r from-emerald-500 to-teal-600 rounded-full flex items-center justify-center shadow-lg shadow-emerald-900/40 active:scale-95 transition-transform z-10">
            <svg class="w-6 h-6 text-white ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
    </main>

    <!-- Bottom Status Info Panel -->
    <footer class="bg-zinc-950 px-4 py-2 flex items-center justify-between text-xs text-gray-400 border-t border-zinc-900">
        <div>Ln 1, Col 1</div>
        <div class="flex items-center space-x-2">
            <span class="w-2 h-2 rounded-full bg-emerald-500 inline-block animate-pulse"></span>
            <span>Ready</span>
        </div>
    </footer>

    <!-- Premium Configuration Sheet Settings Modal -->
    <div id="settingsModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-end justify-center">
        <div class="bg-zinc-900 w-full max-w-xl rounded-t-2xl p-6 border-t border-zinc-800 animate-slide-up shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-lg font-bold text-white">UI Settings & Themes</h3>
                <button onclick="toggleSettingsModal()" class="text-gray-400 hover:text-white text-sm font-medium">Done</button>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="text-xs text-gray-400 block mb-2 font-semibold tracking-wider uppercase">Color Schema</label>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="changeTheme('material-darker', '#212121')" class="bg-zinc-800 text-left p-3 rounded-xl border border-zinc-700 text-sm hover:border-blue-500 text-white">VSCode Dark</button>
                        <button onclick="changeTheme('dracula', '#282a36')" class="bg-[#282a36] text-left p-3 rounded-xl border border-purple-900/50 text-sm hover:border-purple-500 text-purple-200">Dracula Theme</button>
                        <button onclick="changeTheme('default', '#f7f7f7')" class="bg-white text-left p-3 rounded-xl border border-gray-300 text-sm text-gray-800 hover:border-blue-500">GitHub Light</button>
                        <button onclick="changeTheme('neo', '#2b2b2b')" class="bg-[#2b2b2b] text-left p-3 rounded-xl border border-zinc-700 text-sm text-emerald-400 hover:border-emerald-500">Matrix Neo</button>
                    </div>
                </div>
                
                <div class="pt-4 border-t border-zinc-800 flex justify-between text-xs text-gray-500">
                    <span>Version 2.5.0 Premium</span>
                    <a href="#" class="text-blue-400">View Source Code</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Core App Logic Scripts -->
    <script>
        // Init CodeMirror instance
        var editor = CodeMirror.fromTextArea(document.getElementById("editorCode"), {
            lineNumbers: true,
            mode: "python",
            theme: "material-darker",
            tabSize: 4,
            lineWrapping: true
        });

        // Toggle configuration drawer
        function toggleSettingsModal() {
            const modal = document.getElementById('settingsModal');
            modal.classList.toggle('hidden');
        }

        // Theme controller with layout background adjustments
        function changeTheme(themeName, navBgColor) {
            editor.setOption("theme", themeName);
            const navbar = document.getElementById('navbar');
            
            if (themeName === 'default') {
                document.body.className = "bg-gray-100 text-gray-900 font-sans h-screen flex flex-col justify-between overflow-hidden";
                navbar.className = "glass-light px-4 py-3 flex items-center justify-between shadow-sm";
            } else {
                document.body.className = "bg-[#121212] text-gray-200 font-sans h-screen flex flex-col justify-between overflow-hidden";
                navbar.className = "glass px-4 py-3 flex items-center justify-between shadow-lg";
            }
            toggleSettingsModal();
        }

        // Dropdown Selection Language mapping
        document.getElementById('langSelect').addEventListener('change', function(e) {
            editor.setOption("mode", e.target.value);
        });

        // Play callback
        function runConsoleDemo() {
            alert("Code Execution:\n\n" + editor.getValue());
        }
    </script>
</body>
</html>
