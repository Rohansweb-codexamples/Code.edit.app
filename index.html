<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Code.edit Sites</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="brand-block">
        <span class="brand-mark">CE</span>
        <div>
          <p class="eyebrow">Website builder</p>
          <input id="siteName" class="site-name" value="Studio Portfolio" aria-label="Site name" />
        </div>
      </div>
      <nav class="header-actions" aria-label="Site actions">
        <button id="previewButton" class="secondary">Preview</button>
        <button id="publishButton" class="primary">Publish link</button>
        <button id="downloadButton" class="primary">Download HTML</button>
      </nav>
    </header>

    <main class="builder-grid">
      <aside class="sidebar" aria-label="Builder controls">
        <section class="panel">
          <div class="panel-header">
            <h2>Pages</h2>
            <button id="addPageButton" class="small-button">Add page</button>
          </div>
          <div id="pageList" class="page-list"></div>
        </section>

        <section class="panel">
          <h2>Theme</h2>
          <label>Color theme
            <select id="themeSelect">
              <option value="indigo">Indigo studio</option>
              <option value="forest">Forest launch</option>
              <option value="minimal">Minimal paper</option>
              <option value="slate">Slate product</option>
            </select>
          </label>
          <label>Header style
            <select id="headerStyle">
              <option value="split">Split hero</option>
              <option value="centered">Centered hero</option>
              <option value="compact">Compact banner</option>
            </select>
          </label>
        </section>

        <section class="panel">
          <h2>Insert section</h2>
          <div class="tool-grid">
            <button data-section="text">Text block</button>
            <button data-section="feature">Feature cards</button>
            <button data-section="gallery">Gallery</button>
            <button data-section="cta">Call to action</button>
            <button data-section="contact">Contact form</button>
            <button data-section="embed">Embed box</button>
          </div>
        </section>
      </aside>

      <section class="editor-pane" aria-label="Page editor">
        <div class="editor-toolbar">
          <label>Current page
            <select id="currentPageSelect"></select>
          </label>
          <label>Page title
            <input id="pageTitle" type="text" />
          </label>
          <label>Button link
            <input id="buttonLink" type="url" placeholder="https://example.com" />
          </label>
        </div>
        <div id="canvas" class="site-canvas" contenteditable="true" spellcheck="true"></div>
      </section>

      <aside class="preview-pane" aria-label="Live preview">
        <div class="preview-header">
          <h2>Live website preview</h2>
          <span id="shareState">No cookies. Share links store data in the URL.</span>
        </div>
        <iframe id="previewFrame" title="Website preview"></iframe>
      </aside>
    </main>
  </div>

  <dialog id="publishDialog" class="modal">
    <form method="dialog">
      <button class="modal-close" aria-label="Close publish dialog">Close</button>
    </form>
    <h2>Published link ready</h2>
    <p>This link stores the site in the URL itself. It does not require cookies, accounts, or a server database.</p>
    <textarea id="publishedUrl" readonly></textarea>
    <div class="modal-actions">
      <button id="copyLinkButton" class="primary">Copy link</button>
      <button id="openPublishedButton" class="secondary">Open link</button>
    </div>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
